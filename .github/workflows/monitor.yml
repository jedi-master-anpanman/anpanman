# GitHub Actions: 10分おきに空き監視を実行するワークフロー
# 置き場所(リポジトリ内): .github/workflows/monitor.yml

name: okura-anpanman-monitor

on:
  schedule:
    - cron: "*/10 * * * *"   # 10分おき(UTC基準)。混雑時は多少ずれます。
  workflow_dispatch:          # 手動実行ボタンも有効化

# 状態ファイル(okura_state.json)をリポジトリに書き戻すための書き込み権限
permissions:
  contents: write

# 同時実行を防ぐ(前の実行が終わってから次へ)
concurrency:
  group: okura-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        # 空きを見つけると終了コード10になるが、これは失敗ではないので || true で無視
        run: python okura_anpanman_monitor.py || true

      - name: Persist state
        run: |
          if [ -n "$(git status --porcelain okura_state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add okura_state.json
            git commit -m "update state [skip ci]"
            git push
          else
            echo "no state change"
          fi
